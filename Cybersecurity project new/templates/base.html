<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or 'Web Application Security Assessment Tool' }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark cyber-nav sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navBarContent" aria-controls="navBarContent" aria-expanded="false" aria-label="Toggle navigation">

        <div class="collapse navbar-collapse" id="navBarContent">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center gap-lg-2">

            <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
            <li class="nav-item"><a class="nav-link" href="/features">Features</a></li>

            <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>

    <main>
      {% block content %}{% endblock %}

      <div class="container text-center">
        <p class="mb-1 fw-semibold">For Educational and Authorized Security Testing Purposes Only</p>
        <small class="text-white-50">Web Application Security Assessment Tool</small>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
